name: Config Server CI/CD

on:
  push:
    branches: [master, develop, "release/**", "feature/**"]
    paths:
      - "config-server/**"
      - ".github/workflows/config-server-ci.yml"
  pull_request:
    branches: [master, develop]
    paths:
      - "config-server/**"
      - ".github/workflows/config-server-ci.yml"

env:
  SERVICE_NAME: config-server
  JAVA_VERSION: 21
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./config-server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "temurin"
          cache: "maven"

      - name: Build with Maven
        run: |
          ./mvnw install -N -f ../pom.xml -DskipTests
          ./mvnw install -pl common-config -f ../pom.xml -DskipTests
          ./mvnw clean verify

      - name: Run tests
        run: |
          ./mvnw install -N -f ../pom.xml -DskipTests
          ./mvnw install -pl common-config -f ../pom.xml -DskipTests
          ./mvnw test

      - name: Generate JaCoCo coverage report
        run: ./mvnw jacoco:report

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./config-server/target/site/jacoco/jacoco.xml
          flags: config-server
          name: config-server-coverage

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      security-events: write
    defaults:
      run:
        working-directory: ./config-server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "temurin"
          cache: "maven"

      - name: Build JAR
        run: |
          ./mvnw install -N -f ../pom.xml -DskipTests
          ./mvnw install -pl common-config -f ../pom.xml -DskipTests
          ./mvnw clean package -DskipTests

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "./config-server"
          format: "sarif"
          output: "trivy-results.sarif"

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: github.event_name != 'pull_request'
        with:
          sarif_file: "trivy-results.sarif"
        continue-on-error: true

  quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop')
    defaults:
      run:
        working-directory: ./config-server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "temurin"
          cache: "maven"

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Run SonarQube analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ fromJSON(toJSON(secrets)).SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ fromJSON(toJSON(secrets)).SONAR_HOST_URL }}
        run: |
          ./mvnw install -N -f ../pom.xml -DskipTests
          ./mvnw install -pl common-config -f ../pom.xml -DskipTests
          ./mvnw verify sonar:sonar \
            -Dsonar.projectKey=currency-converter-config-server \
            -Dsonar.host.url=$SONAR_HOST_URL \
            -Dsonar.token=$SONAR_TOKEN
        continue-on-error: true

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [build, security-scan]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop')
    defaults:
      run:
        working-directory: ./config-server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "temurin"
          cache: "maven"

      - name: Build JAR
        run: |
          ./mvnw install -N -f ../pom.xml -DskipTests
          ./mvnw install -pl common-config -f ../pom.xml -DskipTests
          ./mvnw clean package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/config-server
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./config-server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
