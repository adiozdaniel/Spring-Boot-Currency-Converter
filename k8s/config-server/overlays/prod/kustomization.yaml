apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: currency-converter

bases:
  - ../../base

commonLabels:
  environment: production

replicas:
  - name: config-server
    count: 3

images:
  - name: ghcr.io/adiozdaniel/config-server
    newTag: latest

patchesStrategicMerge:
  - deployment-patch.yaml

configMapGenerator:
  - name: config-server-config
    behavior: merge
    literals:
      - repo-branch=main
