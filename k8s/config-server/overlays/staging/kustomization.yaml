apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: currency-converter-staging

bases:
  - ../../base

commonLabels:
  environment: staging

replicas:
  - name: config-server
    count: 2

images:
  - name: ghcr.io/adiozdaniel/config-server
    newTag: staging

patchesStrategicMerge:
  - deployment-patch.yaml

configMapGenerator:
  - name: config-server-config
    behavior: merge
    literals:
      - repo-branch=staging
