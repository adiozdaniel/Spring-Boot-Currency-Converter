apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: currency-converter

resources:
  - base/namespace.yaml
  - postgres/pvc.yaml
  - postgres/configmap.yaml
  - postgres/secret.yaml
  - postgres/deployment.yaml
  - postgres/service.yaml
  - rate-service/configmap.yaml
  - rate-service/secret.yaml
  - rate-service/deployment.yaml
  - rate-service/service.yaml
  - rate-service/hpa.yaml
  - main-service/configmap.yaml
  - main-service/deployment.yaml
  - main-service/service.yaml
  - main-service/hpa.yaml
  - main-service/ingress.yaml

commonLabels:
  app.kubernetes.io/managed-by: kustomize
  app.kubernetes.io/part-of: currency-converter

images:
  - name: ${DOCKER_REGISTRY}/main-service
    newTag: ${IMAGE_TAG}
  - name: ${DOCKER_REGISTRY}/rate-service
    newTag: ${IMAGE_TAG}
