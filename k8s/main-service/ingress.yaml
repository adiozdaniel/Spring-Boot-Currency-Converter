apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: main-service-ingress
  namespace: currency-converter
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
  - hosts:
    - api.currency-converter.example.com
    secretName: main-service-tls
  rules:
  - host: api.currency-converter.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: main-service
            port:
              number: 8000
