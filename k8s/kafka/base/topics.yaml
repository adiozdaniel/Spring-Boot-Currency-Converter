apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-topics-init
  namespace: kafka
data:
  create-topics.sh: |
    #!/bin/bash
    set -e

    KAFKA_BOOTSTRAP_SERVERS="${KAFKA_BOOTSTRAP_SERVERS:-kafka-0.kafka.kafka.svc.cluster.local:9092}"

    # Wait for Kafka to be ready
    echo "Waiting for Kafka to be ready..."
    until kafka-broker-api-versions --bootstrap-server $KAFKA_BOOTSTRAP_SERVERS > /dev/null 2>&1; do
      echo "Kafka not ready yet..."
      sleep 5
    done
    echo "Kafka is ready!"

    # Create auth.events topic (main topic for all auth events)
    kafka-topics --bootstrap-server $KAFKA_BOOTSTRAP_SERVERS \
      --create --if-not-exists \
      --topic auth.events \
      --partitions 6 \
      --replication-factor 3 \
      --config retention.ms=604800000 \
      --config cleanup.policy=delete

    # Create auth.login.success topic
    kafka-topics --bootstrap-server $KAFKA_BOOTSTRAP_SERVERS \
      --create --if-not-exists \
      --topic auth.login.success \
      --partitions 6 \
      --replication-factor 3 \
      --config retention.ms=604800000 \
      --config cleanup.policy=delete

    # Create auth.login.failed topic (longer retention for security analysis)
    kafka-topics --bootstrap-server $KAFKA_BOOTSTRAP_SERVERS \
      --create --if-not-exists \
      --topic auth.login.failed \
      --partitions 3 \
      --replication-factor 3 \
      --config retention.ms=2592000000 \
      --config cleanup.policy=delete

    # Create auth.tokens topic
    kafka-topics --bootstrap-server $KAFKA_BOOTSTRAP_SERVERS \
      --create --if-not-exists \
      --topic auth.tokens \
      --partitions 6 \
      --replication-factor 3 \
      --config retention.ms=604800000 \
      --config cleanup.policy=delete

    echo "All topics created successfully!"

    # List all topics
    echo "Current topics:"
    kafka-topics --bootstrap-server $KAFKA_BOOTSTRAP_SERVERS --list
---
apiVersion: batch/v1
kind: Job
metadata:
  name: kafka-topics-init
  namespace: kafka
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      containers:
        - name: kafka-topics-init
          image: confluentinc/cp-kafka:7.5.1
          command: ["/bin/bash", "/scripts/create-topics.sh"]
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka-0.kafka.kafka.svc.cluster.local:9092,kafka-1.kafka.kafka.svc.cluster.local:9092,kafka-2.kafka.kafka.svc.cluster.local:9092"
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: kafka-topics-init
            defaultMode: 0755
      restartPolicy: OnFailure
