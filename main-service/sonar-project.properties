# SonarQube Configuration for Main Service
sonar.projectKey=currency-converter-main-service
sonar.projectName=Currency Converter - Main Service
sonar.projectVersion=1.0.0

# Source directories
sonar.sources=src/main/java
sonar.tests=src/test/java

# Encoding
sonar.sourceEncoding=UTF-8

# Java version
sonar.java.source=17
sonar.java.target=17

# Coverage report paths
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
sonar.junit.reportPaths=target/surefire-reports

# Exclusions
sonar.exclusions=**/config/**,**/dto/**,**/model/**
sonar.coverage.exclusions=**/config/**,**/dto/**,**/model/**,**/MainServiceApplication.java

# Code quality thresholds
sonar.qualitygate.wait=true

# Additional analysis parameters
sonar.java.binaries=target/classes
sonar.java.libraries=target/*.jar
