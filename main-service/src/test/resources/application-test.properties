# Test configuration for Main Service
spring.application.name=main-service-test
server.port=0

# Disable Spring Cloud Config for tests
spring.cloud.config.enabled=false

# In-memory H2 database for tests
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# R2DBC H2 Configuration for tests
spring.r2dbc.url=r2dbc:h2:mem:///testdb
spring.r2dbc.username=sa
spring.r2dbc.password=

# Kafka Configuration (disabled for tests)
kafka.enabled=false
kafka.consumer.group-id=test-consumer-group
kafka.consumer.auto-offset-reset=earliest
kafka.consumer.max-poll-records=100
kafka.consumer.enable-auto-commit=false
kafka.consumer.concurrency=1
kafka.topics.auth-events=auth.events
kafka.topics.auth-login-success=auth.login.success
kafka.topics.auth-login-failed=auth.login.failed
kafka.topics.auth-tokens=auth.tokens
kafka.topics.auth-dlq=auth.dlq

# Session Management
session.max-failed-attempts=5
session.lock-duration-seconds=300
session.alert-threshold=3

# Cache Configuration
spring.cache.type=caffeine

# Logging
logging.level.com.example.mainservice=DEBUG
logging.level.org.springframework.kafka=WARN
