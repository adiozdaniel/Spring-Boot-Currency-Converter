# Test application properties
spring.application.name=main-service
server.port=0

# Disable Spring Cloud Config for tests
spring.cloud.config.enabled=false

# In-memory H2 database for tests - no schema prefix
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;INIT=CREATE SCHEMA IF NOT EXISTS conversion_schema
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Flyway - disable for tests or use H2 compatible scripts
spring.flyway.enabled=false

# Rate service configuration for tests
rate-service.url=http://localhost:8082
rate-service.connect-timeout=5000
rate-service.read-timeout=5000

# Logging
logging.level.com.example.mainservice=DEBUG
