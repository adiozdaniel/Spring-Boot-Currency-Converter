spring.application.name=main-service

spring.cloud.config.uri=${CONFIG_SERVER_URI}
spring.cloud.config.username=${CONFIG_SERVER_USERNAME}
spring.cloud.config.password=${CONFIG_SERVER_PASSWORD}
spring.cloud.config.fail-fast=${CONFIG_FAIL_FAST}
spring.cloud.config.retry.initial-interval=${CONFIG_RETRY_INITIAL_INTERVAL}
spring.cloud.config.retry.max-interval=${CONFIG_RETRY_MAX_INTERVAL}
spring.cloud.config.retry.max-attempts=${CONFIG_RETRY_MAX_ATTEMPTS}

spring.profiles.active=${SPRING_PROFILES_ACTIVE}
