spring.application.name=main-service

spring.cloud.config.uri=${CONFIG_SERVER_URI:http://config-server:8888}
spring.cloud.config.username=${CONFIG_SERVER_USERNAME:config-user}
spring.cloud.config.password=${CONFIG_SERVER_PASSWORD:changeme}
spring.cloud.config.fail-fast=${CONFIG_FAIL_FAST:false}
spring.cloud.config.retry.initial-interval=1000
spring.cloud.config.retry.max-interval=2000
spring.cloud.config.retry.max-attempts=6

spring.profiles.active=${SPRING_PROFILES_ACTIVE:development}
