# Test Configuration
spring.cloud.config.enabled=false
spring.cloud.config.import-check.enabled=false
spring.cloud.bootstrap.enabled=false

# Server
server.port=0

# Test API keys
api-keys.web=test-web-api-key
api-keys.mobile=test-mobile-api-key
api-keys.platform=test-platform-api-key

# Test JWT
jwt.secret=test-jwt-secret-key-minimum-32-characters-long
jwt.expiration=3600000
jwt.refresh-expiration=7200000

# Test CORS
cors.allowed-origins=http://localhost:3000
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=Authorization,Content-Type
cors.allow-credentials=true
cors.max-age=3600

# Test Rate Limiting
rate-limit.capacity=100
rate-limit.refill-tokens=100
rate-limit.refill-duration-seconds=60

# Actuator
management.endpoints.web.exposure.include=health,info

# Kafka - disabled for unit tests
kafka.enabled=false
spring.kafka.enabled=false
spring.kafka.bootstrap-servers=
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
spring.kafka.admin.auto-create=false
