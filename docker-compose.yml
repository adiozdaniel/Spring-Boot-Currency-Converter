version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: currency-converter-db
    environment:
      POSTGRES_DB: conversions_database
      POSTGRES_USER: db_username
      POSTGRES_PASSWORD: db_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U db_username"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - currency-converter-network

  rate-service:
    build:
      context: ./rate-service
      dockerfile: Dockerfile
    container_name: rate-service
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EXCHANGE_RATE_API_KEY: ${EXCHANGE_RATE_API_KEY}
      EXCHANGE_RATE_API_URL: ${EXCHANGE_RATE_API_URL}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - currency-converter-network
    restart: unless-stopped

  main-service:
    build:
      context: ./main-service
      dockerfile: Dockerfile
    container_name: main-service
    ports:
      - "8000:8000"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/conversions_database
      SPRING_DATASOURCE_USERNAME: db_username
      SPRING_DATASOURCE_PASSWORD: db_password
      RATE_SERVICE_URL: http://rate-service:8080/rate
    depends_on:
      postgres:
        condition: service_healthy
      rate-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - currency-converter-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  currency-converter-network:
    driver: bridge
