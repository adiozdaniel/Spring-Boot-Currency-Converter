# Rate Service Configuration
# Common configuration for all environments

spring.application.name=rate-service

# Exchange Rate API Configuration
# API key for external exchange rate service
exchange-rate.api.key={cipher}PLACEHOLDER_EXCHANGE_RATE_API_KEY
exchange-rate.api.url=https://api.exchangeratesapi.io/v1
exchange-rate.api.endpoint=/pair
exchange-rate.api.connect-timeout=5000
exchange-rate.api.read-timeout=10000
exchange-rate.api.cache-ttl=3600

# Security
# Internal API key for service-to-service communication
security-api.key={cipher}PLACEHOLDER_INTERNAL_API_KEY

# Caching
cache.ttl=3600  # 1 hour
cache.max-size=1000
