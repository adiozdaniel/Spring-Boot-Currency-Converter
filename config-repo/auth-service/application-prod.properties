# Auth Service - Production Environment

logging.level.root=WARN
logging.level.com.example=INFO

# Production API keys (encrypted)
api-keys.web={cipher}PLACEHOLDER_PROD_WEB_API_KEY
api-keys.mobile={cipher}PLACEHOLDER_PROD_MOBILE_API_KEY
api-keys.platform={cipher}PLACEHOLDER_PROD_PLATFORM_API_KEY

jwt.secret={cipher}PLACEHOLDER_PROD_JWT_SECRET
jwt.expiration=3600000
jwt.refresh-expiration=86400000

# Production CORS - strict origins
cors.allowed-origins=https://app.example.com,https://mobile.example.com
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=Authorization,Content-Type,X-Requested-With,X-API-Key
cors.allow-credentials=true
cors.max-age=3600

# Stricter rate limits for production
rate-limit.capacity=50
rate-limit.refill-tokens=50
rate-limit.refill-duration-seconds=60

# Kafka Configuration for Production
kafka.enabled=true
kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}
kafka.security.protocol=SASL_SSL
kafka.sasl.mechanism=SCRAM-SHA-512
kafka.sasl.jaas-config=${KAFKA_SASL_JAAS_CONFIG}
kafka.ssl.truststore-location=${KAFKA_SSL_TRUSTSTORE_LOCATION}
kafka.ssl.truststore-password=${KAFKA_SSL_TRUSTSTORE_PASSWORD}
kafka.ssl.keystore-location=${KAFKA_SSL_KEYSTORE_LOCATION}
kafka.ssl.keystore-password=${KAFKA_SSL_KEYSTORE_PASSWORD}
kafka.ssl.key-password=${KAFKA_SSL_KEY_PASSWORD}

# Production topics with full replication
kafka.topics.auth-events.partitions=6
kafka.topics.auth-events.replication-factor=3

kafka.topics.auth-login-success.partitions=6
kafka.topics.auth-login-success.replication-factor=3

kafka.topics.auth-login-failed.partitions=3
kafka.topics.auth-login-failed.replication-factor=3

kafka.topics.auth-tokens.partitions=6
kafka.topics.auth-tokens.replication-factor=3
