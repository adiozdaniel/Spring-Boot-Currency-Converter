# Auth Service Configuration
# Common configuration for all environments

spring.application.name=auth-service

# API Keys (encrypted - load from config server)
api-keys.web={cipher}PLACEHOLDER_WEB_API_KEY
api-keys.mobile={cipher}PLACEHOLDER_MOBILE_API_KEY
api-keys.platform={cipher}PLACEHOLDER_PLATFORM_API_KEY

# JWT Configuration
jwt.secret={cipher}PLACEHOLDER_JWT_SECRET
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# CORS Configuration
cors.allowed-origins=http://localhost:3000,http://localhost:8080
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=Authorization,Content-Type,X-Requested-With,X-API-Key
cors.allow-credentials=true
cors.max-age=3600

# Rate Limiting
rate-limit.capacity=100
rate-limit.refill-tokens=100
rate-limit.refill-duration-seconds=60

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true
