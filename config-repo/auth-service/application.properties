# Auth Service Configuration
# gRPC Server Configuration
grpc.server.port=9091

# Common configuration for all environments
spring.application.name=auth-service


# API Keys (encrypted - load from config server)
api-keys.web={cipher}PLACEHOLDER_WEB_API_KEY
api-keys.mobile={cipher}PLACEHOLDER_MOBILE_API_KEY
api-keys.platform={cipher}PLACEHOLDER_PLATFORM_API_KEY

# JWT Configuration
jwt.secret={cipher}PLACEHOLDER_JWT_SECRET
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# CORS Configuration
cors.allowed-origins=http://localhost:3000,http://localhost:8080
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=Authorization,Content-Type,X-Requested-With,X-API-Key
cors.allow-credentials=true
cors.max-age=3600

# Rate Limiting
rate-limit.capacity=100
rate-limit.refill-tokens=100
rate-limit.refill-duration-seconds=60

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true

# Kafka Configuration
kafka.enabled=true
kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}
kafka.security.protocol=${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}

# Kafka SSL Configuration (for SSL/SASL_SSL protocols)
kafka.ssl.truststore-location=${KAFKA_SSL_TRUSTSTORE_LOCATION:}
kafka.ssl.truststore-password=${KAFKA_SSL_TRUSTSTORE_PASSWORD:}
kafka.ssl.keystore-location=${KAFKA_SSL_KEYSTORE_LOCATION:}
kafka.ssl.keystore-password=${KAFKA_SSL_KEYSTORE_PASSWORD:}
kafka.ssl.key-password=${KAFKA_SSL_KEY_PASSWORD:}

# Kafka SASL Configuration (for SASL_SSL/SASL_PLAINTEXT protocols)
kafka.sasl.mechanism=${KAFKA_SASL_MECHANISM:}
kafka.sasl.jaas-config=${KAFKA_SASL_JAAS_CONFIG:}

# Kafka Topics Configuration
kafka.topics.auth-events.name=auth.events
kafka.topics.auth-events.partitions=6
kafka.topics.auth-events.replication-factor=3

kafka.topics.auth-login-success.name=auth.login.success
kafka.topics.auth-login-success.partitions=6

kafka.topics.auth-login-failed.name=auth.login.failed
kafka.topics.auth-login-failed.partitions=3

kafka.topics.auth-tokens.name=auth.tokens
kafka.topics.auth-tokens.partitions=6

kafka.topics.auth-dlq.name=auth.dlq

# Kafka Producer Configuration
kafka.producer.retries=3
kafka.producer.retry-backoff-ms=1000
kafka.producer.delivery-timeout-ms=120000
kafka.producer.request-timeout-ms=30000
