# Auth Service - Development Environment

logging.level.root=DEBUG
logging.level.com.currencyconverter=TRACE

# Development API keys (plaintext for dev only)
api-keys.web=dev-web-api-key
api-keys.mobile=dev-mobile-api-key
api-keys.platform=dev-platform-api-key

jwt.secret=dev-jwt-secret-key-for-development-only-min-32-chars
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# More permissive CORS for development
cors.allowed-origins=*
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
cors.allowed-headers=*
cors.allow-credentials=false
cors.max-age=3600

# Higher rate limits for development
rate-limit.capacity=1000
rate-limit.refill-tokens=1000
rate-limit.refill-duration-seconds=60

# Kafka Configuration for Development
kafka.enabled=true
kafka.bootstrap-servers=localhost:9092
kafka.security.protocol=PLAINTEXT

# Local dev topics with lower replication
kafka.topics.auth-events.replication-factor=1
kafka.topics.auth-login-success.replication-factor=1
kafka.topics.auth-login-failed.replication-factor=1
kafka.topics.auth-tokens.replication-factor=1
