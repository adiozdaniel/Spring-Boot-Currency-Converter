# Auth Service - Staging Environment

logging.level.root=INFO
logging.level.com.example=DEBUG

# Staging API keys (encrypted)
api-keys.web={cipher}PLACEHOLDER_STAGING_WEB_API_KEY
api-keys.mobile={cipher}PLACEHOLDER_STAGING_MOBILE_API_KEY
api-keys.platform={cipher}PLACEHOLDER_STAGING_PLATFORM_API_KEY

jwt.secret={cipher}PLACEHOLDER_STAGING_JWT_SECRET
jwt.expiration=43200000
jwt.refresh-expiration=259200000

# Staging CORS
cors.allowed-origins=https://staging.example.com,https://staging-app.example.com
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=Authorization,Content-Type,X-Requested-With,X-API-Key
cors.allow-credentials=true
cors.max-age=3600

# Moderate rate limits for staging
rate-limit.capacity=200
rate-limit.refill-tokens=200
rate-limit.refill-duration-seconds=60

# Kafka Configuration for Staging
kafka.enabled=true
kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}
kafka.security.protocol=SASL_SSL
kafka.sasl.mechanism=SCRAM-SHA-256
kafka.sasl.jaas-config=${KAFKA_SASL_JAAS_CONFIG}
kafka.ssl.truststore-location=${KAFKA_SSL_TRUSTSTORE_LOCATION}
kafka.ssl.truststore-password=${KAFKA_SSL_TRUSTSTORE_PASSWORD}

# Staging topics with moderate replication
kafka.topics.auth-events.replication-factor=2
kafka.topics.auth-login-success.replication-factor=2
kafka.topics.auth-login-failed.replication-factor=2
kafka.topics.auth-tokens.replication-factor=2
