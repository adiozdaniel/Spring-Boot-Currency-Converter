# Main Service - Production Environment

spring.datasource.url=jdbc:postgresql://postgres-prod:5432/conversions_database
spring.datasource.username=prod_user
spring.datasource.password={cipher}PLACEHOLDER_PROD_DB_PASSWORD
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

logging.level.root=WARN
logging.level.com.example=INFO

# Production API keys (all encrypted)
api.keys.platform={cipher}PLACEHOLDER_PROD_PLATFORM_KEY
api.keys.web={cipher}PLACEHOLDER_PROD_WEB_KEY
api.keys.mobile={cipher}PLACEHOLDER_PROD_MOBILE_KEY

jwt.secret={cipher}PLACEHOLDER_PROD_JWT_SECRET
jwt.expiration=3600000  # 1 hour for production

database.encryption.key={cipher}PLACEHOLDER_PROD_DB_ENCRYPTION_KEY
