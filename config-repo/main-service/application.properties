# Main Service Configuration
# Common configuration for all environments

spring.application.name=main-service

# API Keys and Secrets (encrypted)
# To encrypt: POST to http://localhost:8888/encrypt with value in body
# To decrypt: POST to http://localhost:8888/decrypt with encrypted value in body

# Platform API key for external services
api.keys.platform={cipher}PLACEHOLDER_REPLACE_WITH_ENCRYPTED_VALUE
# Web application API key
api.keys.web={cipher}PLACEHOLDER_REPLACE_WITH_ENCRYPTED_VALUE
# Mobile application API key
api.keys.mobile={cipher}PLACEHOLDER_REPLACE_WITH_ENCRYPTED_VALUE

# JWT Configuration
jwt.secret={cipher}PLACEHOLDER_REPLACE_WITH_ENCRYPTED_VALUE
jwt.expiration=86400000  # 24 hours in milliseconds
jwt.refresh-expiration=604800000  # 7 days in milliseconds

# Database configuration
database.encryption.key={cipher}PLACEHOLDER_REPLACE_WITH_ENCRYPTED_VALUE

# External service URLs
services.rate-service.url=http://rate-service:8080
services.rate-service.timeout=5000
