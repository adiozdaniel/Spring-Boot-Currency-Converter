# Main Service Configuration
# Common configuration for all environments

spring.application.name=main-service

# API Keys and Secrets (encrypted)
# To encrypt: POST to http://localhost:8888/encrypt with value in body
# To decrypt: POST to http://localhost:8888/decrypt with encrypted value in body

# Platform API key for external services
api.keys.platform={cipher}PLACEHOLDER_REPLACE_WITH_ENCRYPTED_VALUE
# Web application API key
api.keys.web={cipher}PLACEHOLDER_REPLACE_WITH_ENCRYPTED_VALUE
# Mobile application API key
api.keys.mobile={cipher}PLACEHOLDER_REPLACE_WITH_ENCRYPTED_VALUE

# JWT Configuration
jwt.secret={cipher}PLACEHOLDER_REPLACE_WITH_ENCRYPTED_VALUE
jwt.expiration=86400000  # 24 hours in milliseconds
jwt.refresh-expiration=604800000  # 7 days in milliseconds

# Database configuration
database.encryption.key={cipher}PLACEHOLDER_REPLACE_WITH_ENCRYPTED_VALUE

# External service URLs
services.rate-service.url=http://rate-service:8080
services.rate-service.timeout=5000

# Kafka Configuration
kafka.enabled=true
kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
kafka.security.protocol=${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}

# Kafka SSL Configuration (for SSL/SASL_SSL protocols)
kafka.ssl.truststore-location=${KAFKA_SSL_TRUSTSTORE_LOCATION:}
kafka.ssl.truststore-password=${KAFKA_SSL_TRUSTSTORE_PASSWORD:}
kafka.ssl.keystore-location=${KAFKA_SSL_KEYSTORE_LOCATION:}
kafka.ssl.keystore-password=${KAFKA_SSL_KEYSTORE_PASSWORD:}
kafka.ssl.key-password=${KAFKA_SSL_KEY_PASSWORD:}

# Kafka SASL Configuration (for SASL_SSL/SASL_PLAINTEXT protocols)
kafka.sasl.mechanism=${KAFKA_SASL_MECHANISM:}
kafka.sasl.jaas-config=${KAFKA_SASL_JAAS_CONFIG:}

# Kafka Consumer Configuration
kafka.consumer.group-id=main-service-consumer-group
kafka.consumer.auto-offset-reset=earliest
kafka.consumer.max-poll-records=500
kafka.consumer.enable-auto-commit=false
kafka.consumer.concurrency=3

# Kafka Topics (consumed from auth-service)
kafka.topics.auth-events=auth.events
kafka.topics.auth-login-success=auth.login.success
kafka.topics.auth-login-failed=auth.login.failed
kafka.topics.auth-tokens=auth.tokens
kafka.topics.auth-dlq=auth.dlq

# Session Management
session.max-failed-attempts=5
session.lock-duration-seconds=300
session.alert-threshold=3

# Cache Configuration
spring.cache.type=caffeine
spring.cache.cache-names=userSessions,processedEvents

# Actuator (add kafka health check)
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true
management.health.kafka.enabled=true
