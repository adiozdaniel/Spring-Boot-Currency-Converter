# Main Service - Development Environment

spring.datasource.url=jdbc:postgresql://localhost:5432/conversions_database
spring.datasource.username=dev_user
spring.datasource.password={cipher}PLACEHOLDER_DEV_DB_PASSWORD

spring.r2dbc.url=r2dbc:postgresql://localhost:5432/conversions_database
spring.r2dbc.username=dev_user
spring.r2dbc.password={cipher}PLACEHOLDER_DEV_DB_PASSWORD

logging.level.root=DEBUG
logging.level.com.example=TRACE

# Development API keys (less restrictive)
api.keys.platform={cipher}PLACEHOLDER_DEV_PLATFORM_KEY
api.keys.web=dev-web-api-key-plaintext-ok-for-dev
api.keys.mobile=dev-mobile-api-key-plaintext-ok-for-dev

jwt.secret=dev-jwt-secret-not-for-production
