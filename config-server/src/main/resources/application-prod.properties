spring.cloud.config.server.git.uri=${CONFIG_REPO_URI}
spring.cloud.config.server.git.default-label=main
spring.cloud.config.server.git.username=${CONFIG_REPO_USERNAME}
spring.cloud.config.server.git.password=${CONFIG_REPO_PASSWORD}
spring.cloud.config.server.git.timeout=10
spring.cloud.config.server.git.refresh-rate=300

logging.level.root=WARN
logging.level.org.springframework.cloud.config=INFO
logging.level.org.springframework.security=WARN
