#################################################
# LOCAL OVERRIDE CONFIGURATION
#################################################
# This profile overwrites the Git URI to point to the local filesystem

# Use the project root as the Git repository (contains the .git folder)
spring.cloud.config.server.git.uri=file://${user.dir}/..
spring.cloud.config.server.git.clone-on-start=false
spring.cloud.config.server.git.default-label=master

# Search paths to find files in the local config-repo folder
spring.cloud.config.server.git.search-paths=config-repo,config-repo/{application}

# Local Security Credentials
config.server.username=admin
config.server.password=admin123

# Disable GitHub credentials in local mode
spring.cloud.config.server.git.username=
spring.cloud.config.server.git.password=

# Disable encryption for local development (to avoid the hex errors)
spring.cloud.config.server.encrypt.enabled=false
encrypt.enabled=false
