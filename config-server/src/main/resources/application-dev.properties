# Local Development Configuration
# This profile disables encryption and uses local git repository for development

# Use local Git repository
spring.cloud.config.server.git.uri=file://${user.home}/config-repo
spring.cloud.config.server.git.clone-on-start=true
spring.cloud.config.server.git.default-label=develop

# Disable encryption completely for local development
spring.cloud.config.server.encrypt.enabled=false
encrypt.enabled=false

# Override keystore configuration to prevent loading
encrypt.key-store.location=
encrypt.key-store.password=
encrypt.key-store.alias=
encrypt.key-store.secret=

# Simple security for local development
config.server.username=admin
config.server.password=admin123

# No need for these in local mode
spring.cloud.config.server.git.username=
spring.cloud.config.server.git.password=

logging.level.root=DEBUG
logging.level.org.springframework.cloud.config=TRACE
