server.port=${CONFIG_SERVER_PORT:8888}

spring.application.name=config-server

spring.cloud.config.server.git.uri=${CONFIG_REPO_URI:file://${user.home}/config-repo}
spring.cloud.config.server.git.default-label=${CONFIG_REPO_BRANCH:main}
spring.cloud.config.server.git.search-paths=${CONFIG_SEARCH_PATHS:{application}}
spring.cloud.config.server.git.clone-on-start=true
spring.cloud.config.server.git.force-pull=true
spring.cloud.config.server.git.username=${CONFIG_REPO_USERNAME:}
spring.cloud.config.server.git.password=${CONFIG_REPO_PASSWORD:}

# Encryption configuration
spring.cloud.config.server.encrypt.enabled=true
spring.cloud.config.server.health.enabled=true

# Security configuration
config.server.username=${CONFIG_SERVER_USERNAME:config-user}
config.server.password=${CONFIG_SERVER_PASSWORD:changeme}

# Management and monitoring
management.endpoints.web.exposure.include=health,info,refresh,env,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true
management.metrics.export.prometheus.enabled=true

# Logging
logging.level.root=INFO
logging.level.org.springframework.cloud.config=DEBUG
logging.level.org.springframework.security=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
