#################################################
# SERVICE CONFIGURATION
#################################################
server.port=8888
spring.application.name=config-server
# Default to staging (GitHub)
spring.profiles.active=staging

#################################################
# SECURITY CONFIGURATION
#################################################
# Credentials used by SecurityConfig.java
config.server.username=${CONFIG_SERVER_USERNAME:adiozdaniel}
config.server.password=${CONFIG_SERVER_PASSWORD:}

#################################################
# GITHUB REPOSITORY CONFIGURATION (DEFAULT)
#################################################
spring.cloud.config.server.git.uri=https://github.com/adiozdaniel/Spring-Boot-Currency-Converter.git
spring.cloud.config.server.git.default-label=master
spring.cloud.config.server.git.search-paths=config-repo,config-repo/{application}
spring.cloud.config.server.git.username=${spring.config.server.username}
spring.cloud.config.server.git.password=${spring.config.server.password}
spring.cloud.config.server.git.clone-on-start=false
spring.cloud.config.server.git.timeout=30

#################################################
# ENCRYPTION CONFIGURATION (SYMMETRIC)
#################################################
spring.cloud.config.server.encrypt.enabled=true
encrypt.key=my-safe-encryption-key-32-chars-long

#################################################
# MONITORING & LOGGING
#################################################
management.endpoints.web.exposure.include=health,info,refresh,env,metrics,prometheus
management.endpoint.health.show-details=always
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} | Severity=%-5p | Microservice=${spring.application.name} | %m %n
logging.level.org.springframework.cloud.config=DEBUG
